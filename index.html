<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PITT AGRI | النظام المالي المحترف</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #050505; --accent: #22c55e; --text: #ffffff; --neon-shadow: 0 0 15px rgba(34, 197, 94, 0.5); }
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #ffffff; padding: 10px; }
        .container { max-width: 100%; margin: auto; text-align: center; }
        .farm-title { font-size: 3.5em !important; font-weight: 900; color: var(--accent); margin: 20px 0; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px var(--accent); }
        .glossy-box { background: #0d0d0d; padding: 30px; border-radius: 20px; border: 3px solid var(--accent); box-shadow: var(--neon-shadow); margin: 20px 0; }
        h3 { font-size: 3em !important; font-weight: 900 !important; color: var(--accent) !important; margin-bottom: 25px !important; text-transform: uppercase; }
        input { font-size: 2.2em !important; font-weight: bold; padding: 25px !important; border-radius: 15px !important; border: 3px solid #333; background: #1a1a1a; color: var(--accent) !important; width: 90% !important; margin: 15px 0 !important; }
        .btn { font-size: 2.2em !important; font-weight: 900 !important; background: transparent; border: 4px solid var(--accent) !important; color: var(--accent) !important; padding: 20px 40px !important; border-radius: 15px !important; cursor: pointer; margin: 10px; width: 90%; }
        .btn:hover { background: var(--accent); color: #000; box-shadow: var(--neon-shadow); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { font-size: 2.2em !important; font-weight: 900 !important; color: #fff !important; padding: 30px 10px !important; border-bottom: 4px solid var(--accent) !important; }
        td { font-size: 2.5em !important; font-weight: 800 !important; color: #fff !important; padding: 30px 10px !important; border-bottom: 2px solid #333 !important; }
        .note-item { font-size: 2em !important; color: #fff; padding: 15px; border-bottom: 1px solid #333; text-align: right; display: flex; justify-content: space-between; align-items: center; }
        .note-actions { display: flex; gap: 10px; }
        .note-btn { font-size: 0.6em !important; padding: 10px !important; border: 2px solid var(--accent) !important; color: var(--accent) !important; cursor: pointer; border-radius: 10px; background: transparent; }
        .signature { font-family: 'Arial Black', sans-serif; font-size: 1.5em; color: var(--accent); border: 3px solid var(--accent); padding: 20px 30px; border-radius: 50px; display: inline-block; font-weight: 900; margin-top: 30px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage">
        <h1 class="farm-title">PITT AGRI</h1>
        <div class="glossy-box">
            <h3>Admin</h3>
            <input type="password" id="adminPass" placeholder="كلمة سر المدير">
            <br><button class="btn" onclick="check('admin')">دخول المدير</button>
        </div>
        <div class="glossy-box">
            <h3>دخول الشركاء</h3>
            <input type="password" id="partnerPass" placeholder="كلمة سر الشريك">
            <br><button class="btn" onclick="check('partner')">دخول الشريك</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <h1 class="farm-title" id="title"></h1>
        
        <div id="adminControls" class="hidden glossy-box">
            <h3>Admin Tools</h3>
            <button class="btn" onclick="add('expenses')">+ مصروف</button>
            <button class="btn" onclick="add('sales')">+ مدخلات</button>
            <input type="text" id="partnerName" placeholder="اسم الشريك">
            <input type="number" id="partnerVal" placeholder="القيمة">
            <button class="btn" onclick="updatePartner('paid')">تسجيل دفع</button>
            <button class="btn" onclick="updatePartner('balance')" style="border-color: #ef4444; color: #ef4444;">إضافة عليه</button>
            <input type="text" id="noteInput" placeholder="اكتب ملاحظة...">
            <button class="btn" onclick="addNote()">إضافة ملاحظة</button>
        </div>

        <div class="glossy-box">
            <h3>الملاحظات</h3>
            <div id="notesList"></div>
        </div>

        <div class="glossy-box">
            <h3>المصروفات</h3>
            <table><thead><tr><th>المنتج</th><th>السعر</th><th>التاريخ</th><th>تحكم</th></tr></thead><tbody id="expBody"></tbody></table>
            <div style="font-size:2.8em; font-weight:900; margin-top:20px;">الإجمالي: <span id="totalExp">0</span></div>
        </div>

        <div class="glossy-box">
            <h3>المدخلات</h3>
            <table><thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>التاريخ</th><th>تحكم</th></tr></thead><tbody id="salesBody"></tbody></table>
            <div style="font-size:2.8em; font-weight:900; margin-top:20px;">الإجمالي: <span id="totalSales">0</span></div>
        </div>

        <div class="glossy-box">
            <h3>حسابات الشركاء</h3>
            <table><thead><tr><th>الاسم</th><th>المدفوع</th><th>عليه</th><th>حسابه</th><th>تحكم</th></tr></thead><tbody id="partBody"></tbody></table>
        </div>

        <div class="glossy-box" style="border: 6px solid var(--accent);">
            <h3>صافي الربح النهائي</h3>
            <div id="netProfit" style="font-size: 5em; font-weight:900;">0</div>
        </div>
    </div>

    <div class="signature">Created and designed by programmer (Youssef Galal)</div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyB8_LFxgQEK0ILAZE-GzXt3HPxYuEVIIOQ", authDomain: "pitt-aggri.firebaseapp.com", projectId: "pitt-aggri", storageBucket: "pitt-aggri.firebasestorage.app", messagingSenderId: "767374880012", appId: "1:767374880012:web:b8c9f8ce542d83ea1e1629" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let isAdmin = false;

    function check(role) {
        let pass = (role == 'admin') ? document.getElementById('adminPass').value : document.getElementById('partnerPass').value;
        if(role == 'admin' && pass == '86886') { isAdmin = true; document.getElementById('adminControls').classList.remove('hidden'); start("Admin"); }
        else if(role == 'partner' && pass == '68668') { isAdmin = false; start("واجهة الشركاء"); }
        else alert("كلمة السر خطأ!");
    }

    function start(title) {
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('title').innerText = title;
        renderAll();
    }

    function renderAll() {
        db.collection("expenses").onSnapshot(s => {
            let h = '', total = 0; s.forEach(d => {
                let data = d.data(); total += Number(data.v);
                h += `<tr><td>${data.n}</td><td>${data.v}</td><td>${data.t}</td><td>${isAdmin ? `<button class="btn" style="padding:10px !important; font-size:1.5em !important;" onclick="del('expenses','${d.id}')">X</button>` : '-'}</td></tr>`;
            });
            document.getElementById('expBody').innerHTML = h;
            document.getElementById('totalExp').innerText = total; calc();
        });
        db.collection("sales").onSnapshot(s => {
            let h = '', total = 0; s.forEach(d => {
                let data = d.data(); total += Number(data.v);
                h += `<tr><td>${data.n}</td><td>${data.v}</td><td>${data.q}</td><td>${data.t}</td><td>${isAdmin ? `<button class="btn" style="padding:10px !important; font-size:1.5em !important;" onclick="del('sales','${d.id}')">X</button>` : '-'}</td></tr>`;
            });
            document.getElementById('salesBody').innerHTML = h;
            document.getElementById('totalSales').innerText = total; calc();
        });
        db.collection("partners").onSnapshot(s => {
            let h = ''; s.forEach(d => {
                let data = d.data(); let balance = Number(data.paid) - Number(data.balance);
                h += `<tr><td>${d.id}</td><td>${data.paid}</td><td>${data.balance}</td><td>${balance}</td><td>${isAdmin ? `<button class="btn" style="padding:10px !important; font-size:1.5em !important;" onclick="del('partners','${d.id}')">X</button>` : '-'}</td></tr>`;
            });
            document.getElementById('partBody').innerHTML = h;
        });
        db.collection("notes").onSnapshot(s => {
            let h = ''; s.forEach(d => {
                let note = d.data().text;
                h += `<div class="note-item"><span>📝 ${note}</span>
                        <div class="note-actions">
                            <button class="note-btn" onclick="editNote('${d.id}', '${note}')">تعديل</button>
                            <button class="note-btn" onclick="del('notes','${d.id}')" style="border-color: #ef4444; color: #ef4444;">حذف</button>
                        </div>
                      </div>`;
            });
            document.getElementById('notesList').innerHTML = h;
        });
    }

    function calc() {
        let e = Number(document.getElementById('totalExp').innerText) || 0;
        let s = Number(document.getElementById('totalSales').innerText) || 0;
        let res = s - e;
        let el = document.getElementById('netProfit');
        el.innerText = res;
        el.style.color = (res < 0) ? "#ef4444" : "#22c55e";
    }

    function add(col) {
        let n = prompt("المنتج:"), v = Number(prompt("السعر:")), q = (col == 'sales') ? prompt("الكمية:") : '-', t = prompt("التاريخ:", new Date().toLocaleDateString());
        if(n) db.collection(col).add({n:n, v:v, q:q, t:t});
    }

    function addNote() { 
        let text = document.getElementById('noteInput').value;
        if(text) { db.collection("notes").add({text: text}); document.getElementById('noteInput').value = ''; }
    }

    function editNote(id, oldText) {
        let newText = prompt("عدل الملاحظة:", oldText);
        if(newText !== null && newText !== "") { db.collection("notes").doc(id).update({text: newText}); }
    }

    function del(col, id) { if(confirm("أكيد تحذف؟")) db.collection(col).doc(id).delete(); }

    function updatePartner(type) {
        let name = document.getElementById('partnerName').value, val = Number(document.getElementById('partnerVal').value);
        if(!name) return;
        let ref = db.collection("partners").doc(name);
        ref.get().then(s => {
            if(s.exists) type == 'paid' ? ref.update({paid: s.data().paid + val}) : ref.update({balance: s.data().balance + val});
            else ref.set({paid: type == 'paid' ? val : 0, balance: type == 'balance' ? val : 0});
        });
    }
</script>
</body>
</html>
